name: on-push-main

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/on-push-main.yaml"
      - ".github/workflows/on-version-tagged.yaml"
      - ".gitops/**"
      - "apis/**"
      - "examples/**"
      - "functions/**"
      - "tests/**"
      - "upbound.yaml"

permissions:
  packages: write
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  setup:
    uses: unbounded-tech/workflows-crossplane/.github/workflows/setup.yaml@v2.20.0

  validate:
    needs: setup
    uses: unbounded-tech/workflows-crossplane/.github/workflows/validate.yaml@v2.20.0
    with:
      examples: |
        [
          { "example": "examples/eksclusters/minimal.yaml" },
          { "example": "examples/eksclusters/standard.yaml" },
          { "example": "examples/eksclusters/import.yaml" },
          { "example": "examples/eksclusters/standard.yaml", "observed_resources": "examples/test/mocks/observed-resources/standard/steps/1" },
          { "example": "examples/eksclusters/standard.yaml", "observed_resources": "examples/test/mocks/observed-resources/standard/steps/2" },
          { "example": "examples/eksclusters/standard.yaml", "observed_resources": "examples/test/mocks/observed-resources/standard/steps/3" }
        ]
      api_path: apis/eksclusters
      error_on_missing_schemas: true

  test:
    needs: setup
    uses: unbounded-tech/workflows-crossplane/.github/workflows/test.yaml@v2.20.0

  e2e:
    needs: setup
    uses: unbounded-tech/workflows-crossplane/.github/workflows/e2e.yaml@v2.20.0
    with:
      aws: true
      aws-use-oidc: true
      aws-account-id: "${{ vars.AWS_ACCOUNT_ID }}"
      aws-region: "${{ vars.AWS_REGION }}"
      timeout-minutes: 90
      cleanup-timeout-minutes: 90
      write-env-files: true
      env-vars: |
        {
          "ADMIN_ROLE_ARN": "${{ vars.ADMIN_ROLE_ARN }}",
          "PRIVATE_SUBNET_ID_A": "${{ vars.PRIVATE_SUBNET_ID_A }}",
          "PRIVATE_SUBNET_ID_B": "${{ vars.PRIVATE_SUBNET_ID_B }}"
        }

  version-and-tag:
    name: Version and Tag
    needs:
      - validate
      - test
      - e2e
    uses: unbounded-tech/workflow-vnext-tag/.github/workflows/workflow.yaml@v1.21.0
    secrets:
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
    with:
      useDeployKey: true
